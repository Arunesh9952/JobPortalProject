<div class="container mt-5">

  <div class="d-flex justify-content-between mb-3">
    <h2>Available Jobs</h2>
  </div>

  <div class="card shadow">

    <div class="card-body">

      <table class="table table-hover">

        <thead class="table-dark">
          <tr>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Salary</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let j of jobs">

            <td>{{j.jobTitle}}</td>
            <td>{{j.company}}</td>
            <td>{{j.location}}</td>
            <td>{{j.salaryRange}}</td>

            <td>

              <a
              [routerLink]="['/apply', j.jobId]"
              class="btn btn-success btn-sm">

              Apply

              </a>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
