<div class="container mt-4">

<h2 class="mb-4 text-center">Admin Job Management</h2>

<div class="card shadow mb-4">

<div class="card-header bg-primary text-white">
{{editMode ? 'Update Job' : 'Create Job'}}
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Job Title</label>
<input type="text" class="form-control"
[(ngModel)]="jobForm.jobTitle">
</div>

<div class="col-md-6 mb-3">
<label>Company</label>
<input type="text" class="form-control"
[(ngModel)]="jobForm.company">
</div>

<div class="col-md-6 mb-3">
<label>Location</label>
<input type="text" class="form-control"
[(ngModel)]="jobForm.location">
</div>

<div class="col-md-6 mb-3">
<label>Salary Range</label>
<input type="text" class="form-control"
[(ngModel)]="jobForm.salaryRange">
</div>

<div class="col-md-12 mb-3">
<label>Description</label>
<textarea class="form-control"
rows="3"
[(ngModel)]="jobForm.description">
</textarea>
</div>

</div>

<button class="btn btn-success me-2" (click)="saveJob()">
{{editMode ? 'Update Job' : 'Post Job'}}
</button>

<button class="btn btn-secondary" (click)="resetForm()">
Clear
</button>

</div>

</div>

<div class="card shadow">

<div class="card-header bg-dark text-white">
Posted Jobs
</div>

<div class="card-body">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Title</th>
<th>Company</th>
<th>Location</th>
<th>Salary</th>
<th width="150">Actions</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let job of jobs">

<td>{{job.jobTitle}}</td>
<td>{{job.company}}</td>
<td>{{job.location}}</td>
<td>{{job.salaryRange}}</td>

<td>

<button class="btn btn-warning btn-sm me-2"
(click)="editJob(job)">
Edit
</button>

<button class="btn btn-danger btn-sm"
(click)="deleteJob(job.jobId)">
Delete
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
